<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="icon.png">
<title>Bucket List</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --paper: #f5f0e8;
    --aged: #e8dfc8;
    --accent: #8b2c0a;
    --gold: #c9a227;
    --sage: #5a7a5a;
    --faded: #9a8f7a;
    --shadow: rgba(26,18,9,0.15);
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 80%, rgba(201,162,39,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,44,10,0.06) 0%, transparent 60%);
    padding: 0 0 60px;
  }
 
  /* Header */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 30px,
      rgba(255,255,255,0.02) 30px,
      rgba(255,255,255,0.02) 31px
    );
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
  }
  .header-sub {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(28px, 7vw, 44px);
    font-weight: 700;
    letter-spacing: 0.1em;
    position: relative;
  }
  .header-desc {
    margin-top: 10px;
    font-size: 12px;
    color: rgba(245,240,232,0.55);
    letter-spacing: 0.05em;
  }
 
  /* Stats bar */
  .stats-bar {
    background: var(--ink);
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 14px 24px;
    border-bottom: 1px solid rgba(201,162,39,0.3);
  }
  .stat {
    text-align: center;
    color: var(--paper);
  }
  .stat-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    color: var(--gold);
    display: block;
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(245,240,232,0.5);
    margin-top: 3px;
  }
 
  /* Main */
  main { max-width: 680px; margin: 0 auto; padding: 16px 8px 0; }
 
  /* ヘッダーカテゴリー別達成率 */
  .header-cat-stats {
    background: var(--paper);
    border: none;
    border-bottom: 1.5px solid var(--aged);
    border-radius: 0;
    padding: 6px 16px 8px;
    margin-bottom: 16px;
    box-shadow: 0 3px 8px rgba(26,18,9,0.08);
    position: sticky;
    top: 47px;
    z-index: 99;
  }
  .header-cat-grid {
    display: flex;
    flex-wrap: nowrap;
    gap: 0;
  }
  .header-cat-item {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 4px 6px;
    border-right: 1px solid var(--aged);
    white-space: nowrap;
  }
  .header-cat-item:last-child { border-right: none; }
  .header-cat-total {
    border-left: 2px solid var(--aged);
    background: rgba(139,44,100,0.08);
  }
  .header-cat-total .header-cat-fraction { color: #5a7a5a; }
  .header-cat-total .header-cat-pct { color: #5a7a5a; }
  .header-cat-top { display: contents; }
  .header-cat-icon {
    font-size: 14px;
    flex-shrink: 0;
  }
  .header-cat-name { display: none; }
  .header-cat-fraction {
    font-size: 12px;
    color: var(--ink);
    font-family: 'Shippori Mincho', serif;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .header-cat-pct {
    font-size: 12px;
    color: var(--accent);
    font-family: 'Shippori Mincho', serif;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .header-cat-bar-wrap { display: none; }
  .header-cat-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }
 
  /* Add form */
  .add-section {
    background: white;
    border: 1px solid var(--aged);
    border-radius: 2px;
    padding: 12px 16px 10px;
    box-shadow: 0 2px 12px var(--shadow);
    position: relative;
  }
  .add-section::before {
    content: '+ 新しい夢を追加';
    position: absolute;
    top: -11px; left: 16px;
    background: white;
    padding: 0 8px;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--faded);
  }
  .search-section {
    background: white;
    border: 1px solid var(--aged);
    border-radius: 2px;
    padding: 10px 10px;
    box-shadow: 0 2px 12px var(--shadow);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    min-width: 64px;
    position: relative;
  }
  .search-icon { font-size: 20px; }
  .search-section input[type="text"] {
    width: 100%;
    border: none;
    border-bottom: 1.5px solid var(--aged);
    background: transparent;
    padding: 2px 2px;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    text-align: center;
  }
  .search-section input[type="text"]:focus { border-bottom-color: var(--accent); }
  .search-section input[type="text"]::placeholder { color: var(--faded); font-size: 11px; }
  .search-clear {
    background: none;
    border: none;
    color: var(--faded);
    cursor: pointer;
    font-size: 12px;
    padding: 0;
  }
  .search-clear:hover { color: var(--accent); }
  .search-count {
    font-size: 10px;
    color: var(--accent);
    font-weight: 700;
    white-space: nowrap;
  }
  .search-highlight {
    background: rgba(201,162,39,0.3);
    border-radius: 2px;
  }
  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  input[type="text"] {
    flex: 1;
    border: none;
    border-bottom: 1.5px solid var(--aged);
    background: transparent;
    padding: 4px 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-bottom-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--faded); font-size: 12px; }
 
  .add-meta {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  select {
    border: 1px solid var(--aged);
    background: var(--paper);
    padding: 4px 8px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    color: var(--ink);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    flex: 1;
  }
  .priority-btns { display: flex; gap: 4px; }
  .prio-btn {
    border: 1px solid var(--aged);
    background: var(--paper);
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    color: var(--faded);
  }
  .prio-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
 
  .add-meta-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 5px;
  }
  .meta-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--faded);
    white-space: nowrap;
  }
  .urg-btn {
    border: 1px solid var(--aged);
    background: var(--paper);
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    color: var(--faded);
  }
  .urg-btn.active { background: #8b2c0a; color: white; border-color: #8b2c0a; }
 
  .add-btn {
    background: var(--ink);
    color: var(--gold);
    border: none;
    padding: 5px 16px;
    font-family: 'Shippori Mincho', serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .add-btn:hover { background: var(--accent); color: white; }
 
  /* Filter tabs */
  .filter-tabs {
    display: flex;
    justify-content: space-between;
    gap: 0;
    margin-bottom: 0;
    border-bottom: 1.5px solid var(--aged);
    overflow-x: hidden;
    scrollbar-width: none;
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 100;
    padding: 2px 0 0 0;
    box-shadow: none;
    width: 100%;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 2px 0 2px;
    font-size: 20px;
    letter-spacing: 0;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--faded);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -1.5px;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
    flex: 1;
    min-width: 0;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
  .tab:hover:not(.active) { color: var(--ink); }
  .tab-all { font-size: 20px; padding: 2px 0 2px; }
  .tab-pct {
    font-size: 10px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--ink);
    font-weight: 700;
    letter-spacing: 0;
    line-height: 1;
    min-height: 11px;
  }
  .tab.active .tab-pct { color: var(--accent); }
  .tab-stat {
    font-size: 10px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--ink);
    font-weight: 700;
    letter-spacing: 0;
    line-height: 1;
    min-height: 11px;
  }
  .tab.active .tab-stat { color: var(--accent); }
  .tab-trash { color: #9a8f7a; }
  .tab-trash.active { color: #8b2c0a; border-bottom-color: #8b2c0a; }
 
  /* ゴミ箱を空にするボタン */
  .trash-actions {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 12px;
  }
  .empty-trash-btn {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 5px 14px;
    font-size: 12px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .empty-trash-btn:hover { background: var(--accent); color: white; }
  .restore-btn {
    background: none;
    border: none;
    color: var(--sage);
    cursor: pointer;
    font-size: 12px;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .restore-btn:hover { color: #2a5a2a; }
  .item.trashed { background: #fdf5f5; border-left-color: #e0b0b0 !important; opacity: 0.8; }
 
  /* Items */
  .items-list { display: flex; flex-direction: column; gap: 10px; }
 
  .item {
    background: white;
    border: 1px solid var(--aged);
    border-left: 3px solid var(--aged);
    border-radius: 2px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 4px var(--shadow);
    transition: box-shadow 0.3s, background 0.5s, opacity 0.5s, border-left-color 0.5s;
  }
  /* アニメーションなし */
  .item:hover { box-shadow: 0 3px 12px var(--shadow); transform: translateY(-1px); }
  .item.done {
    background: var(--paper);
    border-left-color: var(--sage);
    opacity: 0.75;
  }
  .item.done .item-text { color: var(--faded); }
 
  .item[data-cat="海外旅行"] { border-left-color: #5b8db8; }
  .item[data-cat="国内旅行"] { border-left-color: #3a9e7a; }
  .item[data-cat="食・グルメ"] { border-left-color: #c87941; }
  .item[data-cat="スキル・学習"] { border-left-color: #7a5bb8; }
  .item[data-cat="人生の目標"] { border-left-color: var(--accent); }
  .item.done { border-left-color: var(--sage) !important; }
 
  .check-btn {
    width: 24px; height: 24px;
    border: 1.5px solid var(--aged);
    border-radius: 50%;
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: transparent;
    font-size: 12px;
  }
  .item.done .check-btn {
    background: var(--sage);
    border-color: var(--sage);
    color: white;
  }
  .check-btn:hover { border-color: var(--sage); }
 
  .item-body { flex: 1; min-width: 0; }
  .item-text {
    font-size: 19px;
    line-height: 1.4;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
  }
  .item-meta {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    align-items: center;
    flex-wrap: wrap;
  }
  .cat-tag {
    font-size: 10px;
    letter-spacing: 0;
    color: var(--ink);
    font-weight: 700;
    white-space: nowrap;
  }
  .prio-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .prio-dot.高 { background: var(--accent); }
  .prio-dot.中 { background: var(--gold); }
  .prio-dot.低 { background: var(--faded); }
 
  .prio-change-btns {
    display: flex;
    gap: 3px;
    margin-top: 5px;
  }
  .prio-change-btn {
    border: 1px solid var(--aged);
    background: var(--paper);
    padding: 2px 4px;
    font-size: 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    color: var(--faded);
    letter-spacing: 0;
    white-space: nowrap;
  }
  .prio-change-btn:hover { background: var(--aged); color: var(--ink); }
  .prio-change-btn.active-高 { background: var(--accent); color: white; border-color: var(--accent); }
  .prio-change-btn.active-中 { background: var(--gold); color: white; border-color: var(--gold); }
  .prio-change-btn.active-低 { background: var(--faded); color: white; border-color: var(--faded); }
 
  .urg-change-btn {
    border: 1px solid var(--aged);
    background: var(--paper);
    padding: 2px 4px;
    font-size: 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    color: var(--faded);
    letter-spacing: 0;
    white-space: nowrap;
  }
  .urg-change-btn:hover { background: var(--aged); color: var(--ink); }
  .urg-change-btn.active-高 { background: #8b2c0a; color: white; border-color: #8b2c0a; }
  .urg-change-btn.active-中 { background: #b84a20; color: white; border-color: #b84a20; }
  .urg-change-btn.active-低 { background: #c8907a; color: white; border-color: #c8907a; }
 
  .item-badges {
    display: flex;
    gap: 5px;
    margin-top: 4px;
    align-items: center;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 2px;
    letter-spacing: 0.08em;
    font-weight: 700;
  }
  .badge-prio-高 { background: rgba(139,44,10,0.12); color: var(--accent); }
  .badge-prio-中 { background: rgba(201,162,39,0.15); color: #a07a10; }
  .badge-prio-低 { background: rgba(154,143,122,0.15); color: var(--faded); }
  .badge-urg-高  { background: rgba(139,44,10,0.15); color: #8b2c0a; }
  .badge-urg-中  { background: rgba(200,100,60,0.13); color: #b84a20; }
  .badge-urg-低  { background: rgba(220,160,140,0.15); color: #b07060; }
 
  /* スコアバッジ：9点が最高、1点が最低 */
  .badge-score { font-weight: 700; font-size: 12px; color: var(--ink); letter-spacing: 0; border: 1px solid var(--aged); background: var(--paper); white-space: nowrap; }
  .score-9 { }
  .score-6 { }
  .score-4 { }
  .score-3 { }
  .score-2 { }
  .score-1 { }
 
  .change-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    flex-wrap: nowrap;
  }
  .change-group {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .change-group-label {
    font-size: 10px;
    color: var(--ink);
    font-weight: 700;
    letter-spacing: 0;
    white-space: nowrap;
  }
    white-space: nowrap;
  }
 
  .delete-btn {
    background: none;
    border: 1px solid var(--aged);
    border-radius: 4px;
    color: var(--faded);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
    line-height: 1;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .delete-btn:hover { color: white; background: var(--accent); border-color: var(--accent); }
 
  .edit-btn {
    background: none;
    border: 1px solid var(--aged);
    border-radius: 4px;
    color: var(--faded);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
    line-height: 1;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .edit-btn:hover { color: white; background: var(--gold); border-color: var(--gold); }
 
  .detail-btn {
    background: none;
    border: 1px solid var(--aged);
    border-radius: 4px;
    color: var(--faded);
    cursor: pointer;
    font-size: 14px;
    padding: 4px 8px;
    line-height: 1;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .detail-btn:hover { color: white; background: #3a6ea5; border-color: #3a6ea5; }
  .detail-btn.active { color: white; background: #3a6ea5; border-color: #3a6ea5; }
 
  .item-btn-col {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
 
  .item-memo-row {
    margin-top: 8px;
    display: none;
  }
  .item-memo-row.open { display: block; }
  .item-memo-textarea {
    width: 100%;
    border: 1px solid var(--aged);
    border-radius: 4px;
    background: #f9f6f0;
    padding: 8px 10px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    color: var(--ink);
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .item-memo-textarea:focus { border-color: #3a6ea5; }
  .item-memo-textarea::placeholder { color: var(--faded); }
  .item-memo-save {
    background: #3a6ea5;
    color: white;
    border: none;
    padding: 4px 14px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 5px;
    transition: all 0.15s;
  }
  .item-memo-save:hover { background: #2a5a8a; }
  .item-memo-preview {
    font-size: 12px;
    color: #3a6ea5;
    margin-top: 4px;
    white-space: pre-wrap;
    line-height: 1.5;
    background: #f0f4fa;
    padding: 6px 10px;
    border-radius: 4px;
    border-left: 3px solid #3a6ea5;
  }
 
  .item-edit-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    align-items: center;
  }
  .item-edit-input {
    flex: 1;
    border: none;
    border-bottom: 1.5px solid var(--gold);
    background: transparent;
    padding: 4px 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .item-edit-save {
    background: var(--ink);
    color: var(--gold);
    border: none;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .item-edit-save:hover { background: var(--sage); color: white; }
  .item-edit-cancel {
    background: none;
    border: 1px solid var(--aged);
    color: var(--faded);
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .item-edit-cancel:hover { color: var(--ink); border-color: var(--ink); }
 
  /* Progress */
  .progress-section { margin-bottom: 24px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--faded);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 4px;
    background: var(--aged);
    border-radius: 2px;
    overflow: hidden;
  }

// バージョン管理でローカルストレージをリセット
const DATA_VERSION = 'v7_new23';
// ===== Firebase REST API =====
const DB_URL = "https://my-bucket-list-1a786-default-rtdb.asia-southeast1.firebasedatabase.app";
 
let items = [];
let trash = [];
let currentFilter = '全て';
let currentPrio = '高';
let currentUrg = '高';
let isSyncing = false;
let pollTimer = null;
 
async function loadFromFirebase() {
  try {
    const [itemsRes, trashRes] = await Promise.all([
      fetch(DB_URL + '/bucketList.json'),
      fetch(DB_URL + '/trashList.json')
    ]);
    const itemsData = await itemsRes.json();
    const trashData = await trashRes.json();
    return {
      items: (itemsData && Array.isArray(itemsData) && itemsData.length >= 10)
        ? itemsData.map(i => ({...i, urg: i.urg || '中'}))
        : null,
      trash: (trashData && Array.isArray(trashData)) ? trashData : []
    };
  } catch(e) {
    console.error('読み込みエラー:', e);
    return null;
  }
}
 
async function saveToFirebase() {
  try {
    await Promise.all([
      fetch(DB_URL + '/bucketList.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(items)
      }),
      fetch(DB_URL + '/trashList.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(trash)
      })
    ]);
    setSyncStatus('synced');
  } catch(e) {
    console.error('保存エラー:', e);
    setSyncStatus('error');
  }
}
 
function save() {
  isSyncing = true;
  setSyncStatus('saving');
  saveToFirebase().then(() => { isSyncing = false; });
}
 
function setSyncStatus(state) {
  const el  = document.getElementById('syncStatus');
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  el.style.display = 'flex';
  if (state === 'saving') {
    dot.className = 'sync-dot saving';
    txt.textContent = '保存中…';
  } else if (state === 'synced') {
    dot.className = 'sync-dot';
    txt.textContent = 'リアルタイム同期中';
  } else {
    dot.className = 'sync-dot error';
    txt.textContent = '同期エラー';
  }
}
 
function startPolling() {
  pollTimer = setInterval(async () => {
    if (isSyncing) return;
    const data = await loadFromFirebase();
    if (!data) return;
    const newItems = JSON.stringify(data.items);
    const newTrash = JSON.stringify(data.trash);
    if (data.items && (newItems !== JSON.stringify(items) || newTrash !== JSON.stringify(trash))) {
      items = data.items;
      trash = data.trash;
      render();
      updateStats();
      updateTrashCount();
      setSyncStatus('synced');
    }
  }, 5000);
}
 
window.onload = async function() {
  // まず先にデフォルトデータで画面を表示
  items = DEFAULT_ITEMS.map(i => ({...i, urg: i.urg || '中'}));
  trash = [];
  render();
  updateStats();
  updateTrashCount();
 
  // Firebaseから読み込み
  try {
    document.getElementById('syncStatus').style.display = 'flex';
    document.getElementById('syncDot').className = 'sync-dot saving';
    document.getElementById('syncText').textContent = '接続中…';
 
    const data = await loadFromFirebase();
    if (data && data.items) {
      items = data.items;
      trash = data.trash;
      render();
      updateStats();
      updateTrashCount();
      setSyncStatus('synced');
      startPolling();
    } else {
      // 初回：デフォルトデータをFirebaseに書き込む
      await saveToFirebase();
      setSyncStatus('synced');

    }

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.mode-btn').forEach(b => {
    if (b.textContent.includes(mode === 'bucket' ? 'バケット' : mode === 'japan' ? '都道府県' : mode === 'china' ? '中国' : '世界')) {
      b.classList.add('active');
    }
  });
  const mainEl = document.querySelector('main');
  const visitPanel = document.getElementById('visitPanel');
  if (mode === 'bucket') {
    mainEl.style.display = '';
    visitPanel.style.display = 'none';
  } else {
    mainEl.style.display = 'none';
    visitPanel.style.display = 'block';
    renderVisit(mode);
  }
}
 
function renderVisit(mode) {
  const titleEl = document.getElementById('visitTitle');
  const statsEl = document.getElementById('visitStats');
  const fillEl  = document.getElementById('visitFill');
  const gridEl  = document.getElementById('visitGrid');
 
  let list, title, key;
  if (mode === 'japan') {
    list = JAPAN_PREFS; title = '🗾 日本 都道府県'; key = 'japan';
  } else if (mode === 'china') {
    list = CHINA_REGIONS; title = '🇨🇳 中国 省・自治区・直轄市'; key = 'china';
  } else {
    list = WORLD_COUNTRIES; title = '🌍 世界の国々'; key = 'world';
  }
 
  const visited = visitData[key] || {};
  const count = Object.keys(visited).length;
  const total = list.length;
  const pct = total ? Math.round(count / total * 100) : 0;
 
  titleEl.textContent = title;
  statsEl.textContent = `訪問済み ${count} / ${total}ヶ所　達成率 ${pct}%`;
  fillEl.style.width = pct + '%';
  const overlayEl = document.getElementById('mapOverlay');
  if (overlayEl) overlayEl.innerHTML = `${count}/${total}<br>${pct}%`;
 
  // 地図を表示
  const mapEl = document.getElementById('visitMap');
  mapEl.innerHTML = MAP_SVG[key];
  const currentYear = new Date().getFullYear();
  // 地図の各pathに色を適用
  mapEl.querySelectorAll('path[data-name]').forEach(path => {
    const name = path.getAttribute('data-name');
    const year = visited[name];
    if (year !== undefined) {
      const age = currentYear - (year || currentYear);
      const opacity = Math.max(0.4, 1 - age * 0.06);
      path.style.fill = `rgba(139,44,100,${opacity})`;
      path.classList.add('map-visited');
      path.title = `${name}（${year || currentYear}年）`;
    }
    // 地図クリックでもトグル
    path.addEventListener('click', () => {
      const gridItem = [...document.querySelectorAll('.visit-item')].find(el => el.textContent.startsWith(name));
      if (gridItem) {
        toggleVisit(key, name, gridItem);
        // 地図の色も更新
        if (visitData[key] && visitData[key][name] !== undefined) {
          const y = visitData[key][name];
          const age2 = currentYear - (y || currentYear);
          const op = Math.max(0.4, 1 - age2 * 0.06);
          path.style.fill = `rgba(139,44,100,${op})`;
          path.classList.add('map-visited');
        } else {
          path.style.fill = '';
          path.classList.remove('map-visited');
        }
      }
    });
  });
 
  // 年ごとに色を変える（最近=濃い緑、古い=薄い緑）
  gridEl.innerHTML = list.map(name => {
    const year = visited[name];
    const isVisited = year !== undefined;
    let style = '';
    if (isVisited && year) {
      const age = currentYear - year;
      const opacity = Math.max(0.4, 1 - age * 0.06);
      style = `style="background:rgba(139,44,100,${opacity});border-color:rgba(139,44,100,${opacity});color:white;"`;
    }
    const yearLabel = isVisited && year ? `<span class="visit-year">${year}</span>` : '';
    return `<div class="visit-item${isVisited ? ' visited' : ''}" ${style} onclick="toggleVisitAndMap('${key}','${name}',this)">${name}${yearLabel}</div>`;
  }).join('');
}
 
function toggleVisitAndMap(key, name, el) {
  toggleVisit(key, name, el);
}
 
// 年選択ダイアログ用の一時変数
let _yearDialogKey = '';
let _yearDialogName = '';
let _yearDialogEl = null;
 
function showYearDialog(key, name, el) {
  _yearDialogKey = key;
  _yearDialogName = name;
  _yearDialogEl = el;
  const currentYear = new Date().getFullYear();
  const sel = document.getElementById('yearSelect');
  sel.innerHTML = '';
  for (let y = currentYear; y >= 1950; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + '年';
    sel.appendChild(opt);
  }
  sel.value = currentYear;
  document.getElementById('yearDialogTitle').textContent = `「${name}」を訪問した年`;
  document.getElementById('yearDialog').style.display = 'flex';
}
 
function confirmYear() {
  const year = parseInt(document.getElementById('yearSelect').value);
  const key = _yearDialogKey;
  const name = _yearDialogName;
  const el = _yearDialogEl;
  document.getElementById('yearDialog').style.display = 'none';
 
  if (!visitData[key]) visitData[key] = {};
  visitData[key][name] = year;
  const currentYear = new Date().getFullYear();
  const age = currentYear - year;
  const opacity = Math.max(0.4, 1 - age * 0.06);
  el.classList.add('visited');
  el.style = `background:rgba(139,44,100,${opacity});border-color:rgba(139,44,100,${opacity});color:white;`;
  let yearEl = el.querySelector('.visit-year');
  if (!yearEl) {
    yearEl = document.createElement('span');
    yearEl.className = 'visit-year';
    el.appendChild(yearEl);
  }
  yearEl.textContent = year;
  saveVisit();
  updateVisitStats(key, el);
  // 地図も更新
  updateMapColor(key, name, opacity);
}
 
function cancelYear() {
  document.getElementById('yearDialog').style.display = 'none';
}
 
function updateMapColor(key, name, opacity) {
  const mapEl = document.getElementById('visitMap');
  if (!mapEl) return;
  const path = mapEl.querySelector(`path[data-name="${name}"]`);
  if (!path) return;
  if (opacity !== null) {
    path.style.fill = `rgba(139,44,100,${opacity})`;
    path.classList.add('map-visited');
  } else {
    path.style.fill = '';
    path.classList.remove('map-visited');
  }
}
 
function updateVisitStats(key, el) {
  const visited = Object.keys(visitData[key] || {}).length;
  const grid = el.closest('.visit-grid');
  const total = grid ? grid.children.length : 1;
  const pct = Math.round(visited / total * 100);
  document.getElementById('visitStats').textContent = `訪問済み ${visited} / ${total}ヶ所　達成率 ${pct}%`;
  document.getElementById('visitFill').style.width = pct + '%';
  const overlayEl = document.getElementById('mapOverlay');
  if (overlayEl) overlayEl.innerHTML = `${visited}/${total}<br>${pct}%`;
}
 
function toggleVisit(key, name, el) {
  if (!visitData[key]) visitData[key] = {};
  if (visitData[key][name] !== undefined) {
    // 訪問済み → 未訪問に戻す
    delete visitData[key][name];
    el.classList.remove('visited');
    el.removeAttribute('style');
    const yearEl = el.querySelector('.visit-year');
    if (yearEl) yearEl.remove();
    saveVisit();
    updateVisitStats(key, el);
    updateMapColor(key, name, null);
  } else {
    // 未訪問 → 年選択ダイアログを表示
    showYearDialog(key, name, el);
  }
}
 
let searchQuery = '';
 
function doSearch(val) {
  searchQuery = val.trim();
  const clearBtn = document.getElementById('searchClear');
  const countEl  = document.getElementById('searchCount');
  if (clearBtn) clearBtn.style.display = searchQuery ? 'block' : 'none';
  if (searchQuery) {
    render();
    // 件数表示
    const hits = items.filter(item =>
      item.text.includes(searchQuery) || (item.memo || '').includes(searchQuery)
    );
    if (countEl) countEl.textContent = `${hits.length}件`;
  } else {
    if (countEl) countEl.textContent = '';
    render();
  }
}
 
function clearSearch() {
  searchQuery = '';
  const input = document.getElementById('searchInput');
  if (input) input.value = '';
  const clearBtn = document.getElementById('searchClear');
  if (clearBtn) clearBtn.style.display = 'none';
  const countEl = document.getElementById('searchCount');
  if (countEl) countEl.textContent = '';
  render();
}
 
function highlightText(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), match =>
    `<span class="search-highlight">${match}</span>`
  );
}
 
function setPrio(btn) {
  document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentPrio = btn.dataset.prio;
}
 
function setUrg(btn) {
  document.querySelectorAll('.urg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentUrg = btn.dataset.urg;
}
 
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}
 
function addItem() {
  const input = document.getElementById('newItem');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  const cat = document.getElementById('catSelect').value;
  items.unshift({ text, cat, prio: currentPrio, urg: currentUrg, done: false });
  input.value = '';
  save();
  render();
}
 
function toggle(i) {
  items[i].done = !items[i].done;
  save();
  if (items[i].done) celebrate();
  render();
}
 
function remove(i) {
  // ゴミ箱に移動
  trash.unshift({...items[i], trashedAt: Date.now()});
  items.splice(i, 1);
  save();
  render();
  updateTrashCount();
}
 
function removeFromTrash(i) {
  trash.splice(i, 1);
  save();
  render();
  updateTrashCount();
}
 
function restoreFromTrash(i) {
  const item = {...trash[i]};
  delete item.trashedAt;
  items.unshift(item);
  trash.splice(i, 1);
  save();
  render();
  updateTrashCount();
}
 
function emptyTrash() {
  if (trash.length === 0) return;
  trash = [];
  save();
  render();
  updateTrashCount();
}
 
function updateTrashCount() {
  const el = document.getElementById('trashCount');
  if (el) el.textContent = trash.length > 0 ? `(${trash.length})` : '';
}
 
function celebrate() {
  const colors = ['#c9a227', '#8b2c0a', '#5a7a5a', '#5b8db8', '#c87941'];
  for (let i = 0; i < 30; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      el.style.animationDuration = (1 + Math.random()) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }, i * 40);
  }
}
 
function changePrio(i, prio) {
  items[i].prio = prio;
  save();
  render();
}
 
function changeUrg(i, urg) {
  items[i].urg = urg;
  save();
  render();
}
 
// スコア計算
function calcScore(item) {
  const pts = { '高': 3, '中': 2, '低': 1 };
  const urg = item.urg || '中';
  return pts[item.prio] * pts[urg];
}
 
// 表示すべき順序を返す
function getSortedItems() {
  if (currentFilter === 'ゴミ箱') return { active: [], done: [] };
  const pts = { '高': 3, '中': 2, '低': 1 };
  const mapped = items.map((item, i) => ({
    ...item, urg: item.urg || '中',
    score: pts[item.prio] * pts[item.urg || '中'],
    _i: i
  }));
  let active, done;
  if (currentFilter === '達成済み') {
    active = [];
    done = mapped.filter(x => x.done).sort((a,b) => b.score - a.score);
  } else if (currentFilter === '全て') {
    active = mapped.filter(x => !x.done).sort((a,b) => b.score - a.score);
    done   = mapped.filter(x =>  x.done).sort((a,b) => b.score - a.score);
  } else {
    active = mapped.filter(x => x.cat === currentFilter && !x.done).sort((a,b) => b.score - a.score);
    done   = mapped.filter(x => x.cat === currentFilter &&  x.done).sort((a,b) => b.score - a.score);
  }
  return { active, done };
}
 
// アイテム1件のHTML内容だけ更新（要素は再利用）
function updateItemContent(el, item) {
  // done状態
  if (item.done) { el.classList.add('done'); } else { el.classList.remove('done'); }
  el.dataset.cat = item.cat;
  // バッジ更新
  el.querySelector('.item-text').textContent = item.text;
  el.querySelector('.badge-urg').className    = `badge badge-urg badge-urg-${item.urg}`;
  el.querySelector('.badge-urg').textContent  = `緊急度 ${item.urg}`;
  el.querySelector('.badge-prio').className   = `badge badge-prio badge-prio-${item.prio}`;
  el.querySelector('.badge-prio').textContent = `重要度 ${item.prio}`;
  el.querySelector('.badge-score').className  = `badge badge-score score-${item.score}`;
  el.querySelector('.badge-score').textContent= `スコア ${item.score}`;
  // 変更ボタンのactive状態
  ['高','中','低'].forEach(v => {
    const ub = el.querySelector(`.urg-change-btn[data-v="${v}"]`);
    const pb = el.querySelector(`.prio-change-btn[data-v="${v}"]`);
    if (ub) { ub.className = `urg-change-btn${item.urg  === v ? ' active-'+v : ''}`; }
    if (pb) { pb.className = `prio-change-btn${item.prio === v ? ' active-'+v : ''}`; }
  });
  // change-row の表示切替
  const cr = el.querySelector('.change-row');
  if (cr) cr.style.display = item.done ? 'none' : '';
}
 
 
function updateStats() {
  const total = items.length;
  const doneCount = items.filter(i => i.done).length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('doneCount').textContent = doneCount;
  document.getElementById('remainCount').textContent = total - doneCount;
 
  // タブの統計を更新
  const cats = ['海外旅行', '国内旅行', '食・グルメ', 'スキル・学習', '人生の目標'];
  cats.forEach(cat => {
    const statEl = document.getElementById(`stat-${cat}`);
    const pctEl  = document.getElementById(`pct-${cat}`);
    if (!statEl) return;
    const ci = items.filter(x => x.cat === cat);
    const ct = ci.length, cd = ci.filter(x => x.done).length;
    const cp = ct ? Math.round(cd / ct * 100) : 0;
    statEl.textContent = `${cd}/${ct}`;
    if (pctEl) pctEl.textContent = `${cp}%`;
  });
 
  // 全て
  const allStat = document.getElementById('stat-all');
  const allPct  = document.getElementById('pct-all');
  if (allStat) {
    const pct = total ? Math.round(doneCount / total * 100) : 0;
    allStat.textContent = `${doneCount}/${total}`;
    if (allPct) allPct.textContent = `${pct}%`;
  }
 
  // 達成済み
  const doneStat = document.getElementById('stat-達成済み');
  const donePct  = document.getElementById('pct-達成済み');
  if (doneStat) doneStat.textContent = `${doneCount}件`;
  if (donePct)  donePct.textContent = '';
}
 
function toFullWidth(n) {
  return String(n).replace(/[0-9]/g, c => '０１２３４５６７８９'[c]);
}
 
function buildItemHTML(item) {
  return `<div class="item ${item.done ? 'done' : ''}" data-cat="${item.cat}" data-idx="${item._i}">
    <button class="check-btn" onclick="toggle(${item._i})">✓</button>
    <div class="item-body">
      <div class="item-text" id="item-text-${item._i}">${highlightText(item.text, searchQuery)}</div>
      <div class="item-edit-row" id="edit-row-${item._i}" style="display:none;">
        <input class="item-edit-input" id="edit-input-${item._i}" type="text" maxlength="60"
          onkeydown="if(event.key==='Enter')saveEdit(${item._i});if(event.key==='Escape')cancelEdit(${item._i})">
        <button class="item-edit-save" onclick="saveEdit(${item._i})">保存</button>
        <button class="item-edit-cancel" onclick="cancelEdit(${item._i})">取消</button>
      </div>
      <div class="change-row" ${item.done ? 'style="display:none"' : ''}>
        <span class="cat-tag">${item.cat}</span>
        <span class="badge badge-score score-${item.score}" title="重要度×緊急度">${toFullWidth(item.score)}</span>
        <div class="change-group">
          <span class="change-group-label">緊急度</span>
          <button class="urg-change-btn${item.urg==='高'?' active-高':''}" data-v="高" onclick="changeUrg(${item._i},'高')">高</button>
          <button class="urg-change-btn${item.urg==='中'?' active-中':''}" data-v="中" onclick="changeUrg(${item._i},'中')">中</button>
          <button class="urg-change-btn${item.urg==='低'?' active-低':''}" data-v="低" onclick="changeUrg(${item._i},'低')">低</button>
        </div>
        <div class="change-group">
          <span class="change-group-label">重要度</span>
          <button class="prio-change-btn${item.prio==='高'?' active-高':''}" data-v="高" onclick="changePrio(${item._i},'高')">高</button>
          <button class="prio-change-btn${item.prio==='中'?' active-中':''}" data-v="中" onclick="changePrio(${item._i},'中')">中</button>
          <button class="prio-change-btn${item.prio==='低'?' active-低':''}" data-v="低" onclick="changePrio(${item._i},'低')">低</button>
        </div>
      </div>
      <div class="item-memo-row${item.memo ? ' open' : ''}" id="memo-row-${item._i}">
        <textarea class="item-memo-textarea" id="memo-input-${item._i}" placeholder="詳細メモを入力…"
          onblur="saveMemo(${item._i})">${item.memo || ''}</textarea>
      </div>
    </div>
    <div class="item-btn-col">
      <button class="detail-btn${item.memo ? ' active' : ''}" onclick="toggleMemo(${item._i})" title="詳細">📝</button>
      <button class="edit-btn" onclick="editItem(${item._i})" title="編集">✎</button>
      <button class="delete-btn" onclick="remove(${item._i})" title="削除">×</button>
    </div>
  </div>`;
}
 
function render() {
  const list = document.getElementById('itemsList');
 
  // ゴミ箱表示
  if (currentFilter === 'ゴミ箱') {
    updateStats();
    updateTrashCount();
    if (trash.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">🗑️</div><div class="empty-text">ゴミ箱は空です</div></div>`;
      return;
    }
    const parts = [`<div class="trash-actions"><button class="empty-trash-btn" onclick="emptyTrash()">🗑️ ゴミ箱を空にする（${trash.length}件完全削除）</button></div>`];
    parts.push(...trash.map((item, i) => {
      const pts = { '高': 3, '中': 2, '低': 1 };
      const urg = item.urg || '中';
      const score = pts[item.prio] * pts[urg];
      return `<div class="item trashed" data-cat="${item.cat}">
        <div class="item-body">
          <div class="item-text" style="color:var(--faded);">${item.text}</div>
          <div class="item-badges">
            <span class="cat-tag">${item.cat}</span>
            <span class="badge badge-urg-${urg}">緊急度 ${urg}</span>
            <span class="badge badge-prio-${item.prio}">重要度 ${item.prio}</span>
            <span class="badge badge-score score-${score}">スコア ${score}</span>
          </div>
        </div>
        <button class="restore-btn" onclick="restoreFromTrash(${i})" title="元に戻す">↩️</button>
        <button class="delete-btn" onclick="removeFromTrash(${i})" title="完全削除">×</button>
      </div>`;
    }));
    list.innerHTML = parts.join('');
    return;
  }
 
  const pts = { '高': 3, '中': 2, '低': 1 };
  let mapped = items.map((item, i) => ({
    ...item, urg: item.urg || '中',
    score: pts[item.prio] * pts[item.urg || '中'], _i: i
  }));
 
  // 検索フィルタリング
  if (searchQuery) {
    mapped = mapped.filter(x =>
      x.text.includes(searchQuery) || (x.memo || '').includes(searchQuery)
    );
  }
 
  let active, done;
  if (currentFilter === '達成済み') {
    active = [];
    done = mapped.filter(x => x.done).sort((a,b) => b.score - a.score);
  } else if (currentFilter === '全て') {
    active = mapped.filter(x => !x.done).sort((a,b) => b.score - a.score);
    done   = mapped.filter(x =>  x.done).sort((a,b) => b.score - a.score);
  } else {
    active = mapped.filter(x => x.cat === currentFilter && !x.done).sort((a,b) => b.score - a.score);
    done   = mapped.filter(x => x.cat === currentFilter &&  x.done).sort((a,b) => b.score - a.score);
  }
  updateStats();
  updateTrashCount();
  if ([...active,...done].length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🌿</div><div class="empty-text">まだ何もありません</div><div class="empty-sub">夢を追加してみましょう</div></div>`;
    return;
  }
  const parts = [];
  if (active.length > 0 && done.length > 0) {
    parts.push(...active.map(item => buildItemHTML(item)));
    parts.push(`<div class="done-separator" style="text-align:center;padding:10px 0 6px;font-size:11px;letter-spacing:0.2em;color:var(--faded);border-top:1px dashed var(--aged);margin-top:4px;">✅ 達成済み</div>`);
    parts.push(...done.map(item => buildItemHTML(item)));
  } else {
    parts.push(...[...active,...done].map(item => buildItemHTML(item)));
  }
  list.innerHTML = parts.join('');
}
 
function toggleMemo(i) {
  const row = document.getElementById(`memo-row-${i}`);
  const btn = row ? row.closest('.item').querySelector('.detail-btn') : null;
  if (!row) return;
  const isOpen = row.classList.toggle('open');
  if (btn) btn.classList.toggle('active', isOpen);
  if (isOpen) {
    const ta = document.getElementById(`memo-input-${i}`);
    if (ta) ta.focus();
  }
}
 
function saveMemo(i) {
  const ta = document.getElementById(`memo-input-${i}`);
  if (!ta) return;
  items[i].memo = ta.value;
  // メモがあればボタンをactive状態に
  const btn = ta.closest('.item').querySelector('.detail-btn');
  if (btn) btn.classList.toggle('active', !!ta.value);
  save();
}
 
function editItem(i) {
  const el = document.getElementById(`edit-row-${i}`);
  const textEl = document.getElementById(`item-text-${i}`);
  if (el.style.display === 'flex') {
    cancelEdit(i);
  } else {
    el.style.display = 'flex';
    const input = document.getElementById(`edit-input-${i}`);
    input.value = items[i].text;
    input.focus();
    input.select();
    textEl.style.opacity = '0.4';
  }
}
 
function saveEdit(i) {
  const input = document.getElementById(`edit-input-${i}`);
  const val = input.value.trim();
  if (val) { items[i].text = val; save(); }
  render();
}
 
function cancelEdit(i) {
  const el = document.getElementById(`edit-row-${i}`);
  const textEl = document.getElementById(`item-text-${i}`);
  el.style.display = 'none';
  textEl.style.opacity = '1';
}
 
 
document.getElementById('newItem').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});
// render() と updateTrashCount() は window.onload で呼ばれます
</script>
</body>
</html>
