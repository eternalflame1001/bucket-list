<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bucket List</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1209;
    --paper: #f5f0e8;
    --aged: #e8dfc8;
    --accent: #8b2c0a;
    --gold: #c9a227;
    --sage: #5a7a5a;
    --faded: #9a8f7a;
    --shadow: rgba(26,18,9,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 80%, rgba(201,162,39,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(139,44,10,0.06) 0%, transparent 60%);
    padding: 0 0 60px;
  }

  /* Header */
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 40px 24px 32px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 30px,
      rgba(255,255,255,0.02) 30px,
      rgba(255,255,255,0.02) 31px
    );
  }
  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--gold), var(--accent));
  }
  .header-sub {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 300;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold);
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Shippori Mincho', serif;
    font-size: clamp(28px, 7vw, 44px);
    font-weight: 700;
    letter-spacing: 0.1em;
    position: relative;
  }
  .header-desc {
    margin-top: 10px;
    font-size: 13px;
    color: rgba(245,240,232,0.55);
    letter-spacing: 0.05em;
  }

  /* Stats bar */
  .stats-bar {
    background: var(--ink);
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 14px 24px;
    border-bottom: 1px solid rgba(201,162,39,0.3);
  }
  .stat {
    text-align: center;
    color: var(--paper);
  }
  .stat-num {
    font-family: 'Shippori Mincho', serif;
    font-size: 22px;
    color: var(--gold);
    display: block;
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: rgba(245,240,232,0.5);
    margin-top: 3px;
  }

  /* Main */
  main { max-width: 680px; margin: 0 auto; padding: 32px 16px 0; }

  /* ヘッダーカテゴリー別達成率 */
  .header-cat-stats {
    background: var(--paper);
    border: none;
    border-bottom: 1.5px solid var(--aged);
    border-radius: 0;
    padding: 6px 16px 8px;
    margin-bottom: 16px;
    box-shadow: 0 3px 8px rgba(26,18,9,0.08);
    position: sticky;
    top: 47px;
    z-index: 99;
  }
  .header-cat-grid {
    display: flex;
    flex-wrap: nowrap;
    gap: 0;
  }
  .header-cat-item {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 4px 6px;
    border-right: 1px solid var(--aged);
    white-space: nowrap;
  }
  .header-cat-item:last-child { border-right: none; }
  .header-cat-total {
    border-left: 2px solid var(--aged);
    background: rgba(90,122,90,0.08);
  }
  .header-cat-total .header-cat-fraction { color: #5a7a5a; }
  .header-cat-total .header-cat-pct { color: #5a7a5a; }
  .header-cat-top { display: contents; }
  .header-cat-icon {
    font-size: 14px;
    flex-shrink: 0;
  }
  .header-cat-name { display: none; }
  .header-cat-fraction {
    font-size: 13px;
    color: var(--ink);
    font-family: 'Shippori Mincho', serif;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .header-cat-pct {
    font-size: 12px;
    color: var(--accent);
    font-family: 'Shippori Mincho', serif;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .header-cat-bar-wrap { display: none; }
  .header-cat-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  /* Add form */
  .add-section {
    background: white;
    border: 1px solid var(--aged);
    border-radius: 2px;
    padding: 12px 16px 10px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px var(--shadow);
    position: relative;
  }
  .add-section::before {
    content: '+ 新しい夢を追加';
    position: absolute;
    top: -11px; left: 16px;
    background: white;
    padding: 0 8px;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--faded);
  }
  .add-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
  }
  input[type="text"] {
    flex: 1;
    border: none;
    border-bottom: 1.5px solid var(--aged);
    background: transparent;
    padding: 4px 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-bottom-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--faded); font-size: 13px; }

  .add-meta {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  select {
    border: 1px solid var(--aged);
    background: var(--paper);
    padding: 4px 8px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    color: var(--ink);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    flex: 1;
  }
  .priority-btns { display: flex; gap: 4px; }
  .prio-btn {
    border: 1px solid var(--aged);
    background: var(--paper);
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    color: var(--faded);
  }
  .prio-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  .add-meta-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 5px;
  }
  .meta-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--faded);
    white-space: nowrap;
  }
  .urg-btn {
    border: 1px solid var(--aged);
    background: var(--paper);
    padding: 3px 8px;
    font-size: 11px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    color: var(--faded);
  }
  .urg-btn.active { background: #8b2c0a; color: white; border-color: #8b2c0a; }

  .add-btn {
    background: var(--ink);
    color: var(--gold);
    border: none;
    padding: 5px 16px;
    font-family: 'Shippori Mincho', serif;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .add-btn:hover { background: var(--accent); color: white; }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 0;
    border-bottom: 1.5px solid var(--aged);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 100;
    padding-top: 6px;
    box-shadow: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 10px 16px;
    font-size: 12px;
    letter-spacing: 0.1em;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--faded);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -1.5px;
    transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; }
  .tab:hover:not(.active) { color: var(--ink); }
  .tab-trash { color: #9a8f7a; }
  .tab-trash.active { color: #8b2c0a; border-bottom-color: #8b2c0a; }

  /* ゴミ箱を空にするボタン */
  .trash-actions {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 12px;
  }
  .empty-trash-btn {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 5px 14px;
    font-size: 12px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    letter-spacing: 0.05em;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .empty-trash-btn:hover { background: var(--accent); color: white; }
  .restore-btn {
    background: none;
    border: none;
    color: var(--sage);
    cursor: pointer;
    font-size: 13px;
    padding: 4px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .restore-btn:hover { color: #2a5a2a; }
  .item.trashed { background: #fdf5f5; border-left-color: #e0b0b0 !important; opacity: 0.8; }

  /* Items */
  .items-list { display: flex; flex-direction: column; gap: 10px; }

  .item {
    background: white;
    border: 1px solid var(--aged);
    border-left: 3px solid var(--aged);
    border-radius: 2px;
    padding: 10px 10px 10px 12px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    box-shadow: 0 1px 4px var(--shadow);
    transition: box-shadow 0.3s, background 0.5s, opacity 0.5s, border-left-color 0.5s;
  }
  /* アニメーションなし */
  .item:hover { box-shadow: 0 3px 12px var(--shadow); transform: translateY(-1px); }
  .item.done {
    background: var(--paper);
    border-left-color: var(--sage);
    opacity: 0.75;
  }
  .item.done .item-text { color: var(--faded); }

  .item[data-cat="海外旅行"] { border-left-color: #5b8db8; }
  .item[data-cat="国内旅行"] { border-left-color: #3a9e7a; }
  .item[data-cat="食・グルメ"] { border-left-color: #c87941; }
  .item[data-cat="スキル・学習"] { border-left-color: #7a5bb8; }
  .item[data-cat="人生の目標"] { border-left-color: var(--accent); }
  .item.done { border-left-color: var(--sage) !important; }

  .check-btn {
    width: 24px; height: 24px;
    border: 1.5px solid var(--aged);
    border-radius: 50%;
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    color: transparent;
    font-size: 12px;
  }
  .item.done .check-btn {
    background: var(--sage);
    border-color: var(--sage);
    color: white;
  }
  .check-btn:hover { border-color: var(--sage); }

  .item-body { flex: 1; min-width: 0; }
  .item-text {
    font-size: 15px;
    line-height: 1.5;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    word-break: break-all;
    overflow-wrap: break-word;
    min-width: 0;
  }
  .item-meta {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    align-items: center;
    flex-wrap: wrap;
  }
  .cat-tag {
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--faded);
  }
  .prio-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .prio-dot.高 { background: var(--accent); }
  .prio-dot.中 { background: var(--gold); }
  .prio-dot.低 { background: var(--faded); }

  .prio-change-btns {
    display: flex;
    gap: 3px;
    margin-top: 5px;
  }
  .prio-change-btn {
    border: 1px solid var(--aged);
    background: var(--paper);
    padding: 2px 7px;
    font-size: 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    color: var(--faded);
    letter-spacing: 0.05em;
  }
  .prio-change-btn:hover { background: var(--aged); color: var(--ink); }
  .prio-change-btn.active-高 { background: var(--accent); color: white; border-color: var(--accent); }
  .prio-change-btn.active-中 { background: var(--gold); color: white; border-color: var(--gold); }
  .prio-change-btn.active-低 { background: var(--faded); color: white; border-color: var(--faded); }

  .urg-change-btn {
    border: 1px solid var(--aged);
    background: var(--paper);
    padding: 2px 7px;
    font-size: 10px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    color: var(--faded);
    letter-spacing: 0.05em;
  }
  .urg-change-btn:hover { background: var(--aged); color: var(--ink); }
  .urg-change-btn.active-高 { background: #8b2c0a; color: white; border-color: #8b2c0a; }
  .urg-change-btn.active-中 { background: #b84a20; color: white; border-color: #b84a20; }
  .urg-change-btn.active-低 { background: #c8907a; color: white; border-color: #c8907a; }

  .item-badges {
    display: flex;
    gap: 5px;
    margin-top: 4px;
    align-items: center;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 2px;
    letter-spacing: 0.08em;
    font-weight: 700;
  }
  .badge-prio-高 { background: rgba(139,44,10,0.12); color: var(--accent); }
  .badge-prio-中 { background: rgba(201,162,39,0.15); color: #a07a10; }
  .badge-prio-低 { background: rgba(154,143,122,0.15); color: var(--faded); }
  .badge-urg-高  { background: rgba(139,44,10,0.15); color: #8b2c0a; }
  .badge-urg-中  { background: rgba(200,100,60,0.13); color: #b84a20; }
  .badge-urg-低  { background: rgba(220,160,140,0.15); color: #b07060; }

  /* スコアバッジ：9点が最高、1点が最低 */
  .badge-score { font-weight: 700; letter-spacing: 0.05em; }
  .score-9 { background: rgba(139,44,10,0.18); color: #8b2c0a; border: 1px solid rgba(139,44,10,0.3); }
  .score-6 { background: rgba(201,162,39,0.18); color: #9a7010; border: 1px solid rgba(201,162,39,0.3); }
  .score-4 { background: rgba(90,122,90,0.15); color: #3d6e3d; border: 1px solid rgba(90,122,90,0.25); }
  .score-3 { background: rgba(106,156,191,0.15); color: #3a6ea5; border: 1px solid rgba(106,156,191,0.25); }
  .score-2 { background: rgba(154,143,122,0.12); color: var(--faded); border: 1px solid rgba(154,143,122,0.2); }
  .score-1 { background: rgba(154,143,122,0.08); color: #bbb; border: 1px solid rgba(154,143,122,0.15); }

  .change-row {
    display: flex;
    gap: 10px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .change-group {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .change-group-label {
    font-size: 10px;
    color: var(--faded);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  .delete-btn {
    background: none;
    border: 1px solid var(--aged);
    border-radius: 4px;
    color: var(--faded);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    line-height: 1;
    transition: all 0.15s;
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .delete-btn:hover { color: white; background: var(--accent); border-color: var(--accent); }

  .edit-btn {
    background: none;
    border: 1px solid var(--aged);
    border-radius: 4px;
    color: var(--faded);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    line-height: 1;
    transition: all 0.15s;
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .edit-btn:hover { color: white; background: var(--gold); border-color: var(--gold); }

  .detail-btn {
    background: none;
    border: 1px solid var(--aged);
    border-radius: 4px;
    color: var(--faded);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    line-height: 1;
    transition: all 0.15s;
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .detail-btn:hover { color: white; background: #3a6ea5; border-color: #3a6ea5; }
  .detail-btn.active { color: white; background: #3a6ea5; border-color: #3a6ea5; }

  .item-memo-row {
    margin-top: 8px;
    display: none;
  }
  .item-memo-row.open { display: block; }
  .item-memo-textarea {
    width: 100%;
    border: 1px solid var(--aged);
    border-radius: 4px;
    background: #f9f6f0;
    padding: 8px 10px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .item-memo-textarea:focus { border-color: #3a6ea5; }
  .item-memo-textarea::placeholder { color: var(--faded); }
  .item-memo-save {
    background: #3a6ea5;
    color: white;
    border: none;
    padding: 4px 14px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    margin-top: 5px;
    transition: all 0.15s;
  }
  .item-memo-save:hover { background: #2a5a8a; }
  .item-memo-preview {
    font-size: 12px;
    color: #3a6ea5;
    margin-top: 4px;
    white-space: pre-wrap;
    line-height: 1.5;
    background: #f0f4fa;
    padding: 6px 10px;
    border-radius: 4px;
    border-left: 3px solid #3a6ea5;
  }

  .item-edit-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    align-items: center;
  }
  .item-edit-input {
    flex: 1;
    border: none;
    border-bottom: 1.5px solid var(--gold);
    background: transparent;
    padding: 4px 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .item-edit-save {
    background: var(--ink);
    color: var(--gold);
    border: none;
    padding: 4px 12px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .item-edit-save:hover { background: var(--sage); color: white; }
  .item-edit-cancel {
    background: none;
    border: 1px solid var(--aged);
    color: var(--faded);
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .item-edit-cancel:hover { color: var(--ink); border-color: var(--ink); }

  /* Progress */
  .progress-section { margin-bottom: 24px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--faded);
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 4px;
    background: var(--aged);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sage), var(--gold));
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 48px 24px;
    color: var(--faded);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-family: 'Shippori Mincho', serif; font-size: 16px; }
  .empty-sub { font-size: 12px; margin-top: 6px; letter-spacing: 0.05em; }

  /* カテゴリー別達成率 */
  .cat-stats {
    background: white;
    border: 1px solid var(--aged);
    border-radius: 2px;
    padding: 14px 16px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px var(--shadow);
  }
  .cat-stats-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--faded);
    margin-bottom: 10px;
  }
  .cat-stat-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .cat-stat-row:last-child { margin-bottom: 0; }
  .cat-stat-label {
    font-size: 11px;
    color: var(--ink);
    width: 90px;
    flex-shrink: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cat-stat-bar-wrap {
    flex: 1;

// バージョン管理でローカルストレージをリセット
const DATA_VERSION = 'v7_new23';
// ===== Firebase REST API =====
const DB_URL = "https://my-bucket-list-1a786-default-rtdb.asia-southeast1.firebasedatabase.app";

let items = [];
let trash = [];
let currentFilter = '全て';
let currentPrio = '高';
let currentUrg = '高';
let isSyncing = false;
let pollTimer = null;

async function loadFromFirebase() {
  try {
    const [itemsRes, trashRes] = await Promise.all([
      fetch(DB_URL + '/bucketList.json', {cache:'no-store'}),
      fetch(DB_URL + '/trashList.json', {cache:'no-store'})
    ]);
    const itemsData = await itemsRes.json();
    const trashData = await trashRes.json();
    return {
      items: (itemsData && Array.isArray(itemsData) && itemsData.length > 0)
        ? itemsData.map(i => ({...i, urg: i.urg || '中'}))
        : null,
      trash: (trashData && Array.isArray(trashData)) ? trashData : []
    };
  } catch(e) {
    console.error('読み込みエラー:', e);
    return null;
  }
}

async function saveToFirebase() {
  try {
    await Promise.all([
      fetch(DB_URL + '/bucketList.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(items)
      }),
      fetch(DB_URL + '/trashList.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(trash)
      })
    ]);
    setSyncStatus('synced');
  } catch(e) {
    console.error('保存エラー:', e);
    setSyncStatus('error');
  }
}

function save() {
  isSyncing = true;
  setSyncStatus('saving');
  saveToFirebase().then(() => { isSyncing = false; });
}

function setSyncStatus(state) {
  const el  = document.getElementById('syncStatus');
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  el.style.display = 'flex';
  if (state === 'saving') {
    dot.className = 'sync-dot saving';
    txt.textContent = '保存中…';
  } else if (state === 'synced') {
    dot.className = 'sync-dot';
    txt.textContent = 'リアルタイム同期中';
  } else {
    dot.className = 'sync-dot error';
    txt.textContent = '同期エラー';
  }
}

function startPolling() {
  pollTimer = setInterval(async () => {
    if (isSyncing) return;
    const data = await loadFromFirebase();
    if (!data) return;
    const newItems = JSON.stringify(data.items);
    const newTrash = JSON.stringify(data.trash);
    if (data.items && (newItems !== JSON.stringify(items) || newTrash !== JSON.stringify(trash))) {
      items = data.items;
      trash = data.trash;
      render();
      updateStats();
      updateTrashCount();
      setSyncStatus('synced');
    }
  }, 5000);
}

window.onload = async function() {
  // まず先にデフォルトデータで画面を表示
  items = DEFAULT_ITEMS.map(i => ({...i, urg: i.urg || '中'}));
  trash = [];
  render();
  updateStats();
  updateTrashCount();

  // Firebaseから読み込み
  try {
    document.getElementById('syncStatus').style.display = 'flex';
    document.getElementById('syncDot').className = 'sync-dot saving';
    document.getElementById('syncText').textContent = '接続中…';

    const data = await loadFromFirebase();
    if (data && data.items) {
      items = data.items;
      trash = data.trash;
      render();
      updateStats();
      updateTrashCount();
      setSyncStatus('synced');
      startPolling();
    } else {
      // Firebaseにデータがない場合はデフォルトを使用（上書きしない）
      setSyncStatus('synced');
      startPolling();
    }
    // 訪問記録を読み込み
    await loadVisitFromFirebase();
  } catch(e) {
    console.error('Firebase接続エラー:', e);
    document.getElementById('syncStatus').style.display = 'flex';
    document.getElementById('syncDot').className = 'sync-dot error';
    document.getElementById('syncText').textContent = '同期エラー（オフライン動作中）';
    // オフラインでも訪問記録を試みる
    try { await loadVisitFromFirebase(); } catch(e2) {}
  }
};

// スコア計算
function calcScore(item) {
  const pts = { '高': 3, '中': 2, '低': 1 };
  const urg = item.urg || '中';
  return pts[item.prio] * pts[urg];
}

// 表示すべき順序を返す
function getSortedItems() {
  if (currentFilter === 'ゴミ箱') return { active: [], done: [] };
  const pts = { '高': 3, '中': 2, '低': 1 };
  const mapped = items.map((item, i) => ({
    ...item, urg: item.urg || '中',
    score: pts[item.prio] * pts[item.urg || '中'],
    _i: i
  }));
  let active, done;
  if (currentFilter === '達成済み') {
    active = [];
    done = mapped.filter(x => x.done).sort((a,b) => b.score - a.score);
  } else if (currentFilter === '全て') {
    active = mapped.filter(x => !x.done).sort((a,b) => b.score - a.score);
    done   = mapped.filter(x =>  x.done).sort((a,b) => b.score - a.score);
  } else {
    active = mapped.filter(x => x.cat === currentFilter && !x.done).sort((a,b) => b.score - a.score);
    done   = mapped.filter(x => x.cat === currentFilter &&  x.done).sort((a,b) => b.score - a.score);
  }
  return { active, done };
}

function render() {
  const list = document.getElementById('itemsList');

  // ゴミ箱表示
  if (currentFilter === 'ゴミ箱') {
    updateStats();
    updateTrashCount();
    if (trash.length === 0) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">🗑️</div><div class="empty-text">ゴミ箱は空です</div></div>`;
      return;
    }
    const parts = [`<div class="trash-actions"><button class="empty-trash-btn" onclick="emptyTrash()">🗑️ ゴミ箱を空にする（${trash.length}件完全削除）</button></div>`];
    parts.push(...trash.map((item, i) => {
      const pts = { '高': 3, '中': 2, '低': 1 };
      const urg = item.urg || '中';
      const score = pts[item.prio] * pts[urg];
      return `<div class="item trashed" data-cat="${item.cat}">
        <div class="item-body">
          <div class="item-text" style="color:var(--faded);">${item.text}</div>
          <div class="item-badges">
            <span class="cat-tag">${item.cat}</span>
            <span class="badge badge-urg-${urg}">緊急度 ${urg}</span>
            <span class="badge badge-prio-${item.prio}">重要度 ${item.prio}</span>
            <span class="badge badge-score score-${score}">スコア ${score}</span>
          </div>
        </div>
        <button class="restore-btn" onclick="restoreFromTrash(${i})" title="元に戻す">↩️</button>
        <button class="delete-btn" onclick="removeFromTrash(${i})" title="完全削除">×</button>
      </div>`;
    }));
    list.innerHTML = parts.join('');
    return;
  }

  const pts = { '高': 3, '中': 2, '低': 1 };
  const mapped = items.map((item, i) => ({
    ...item, urg: item.urg || '中',
    score: pts[item.prio] * pts[item.urg || '中'], _i: i
  }));
  let active, done;
  if (currentFilter === '達成済み') {
    active = [];
    done = mapped.filter(x => x.done).sort((a,b) => b.score - a.score);
  } else if (currentFilter === '全て') {
    active = mapped.filter(x => !x.done).sort((a,b) => b.score - a.score);
    done   = mapped.filter(x =>  x.done).sort((a,b) => b.score - a.score);
  } else {
    active = mapped.filter(x => x.cat === currentFilter && !x.done).sort((a,b) => b.score - a.score);
    done   = mapped.filter(x => x.cat === currentFilter &&  x.done).sort((a,b) => b.score - a.score);
  }
  updateStats();
  updateTrashCount();
  if ([...active,...done].length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🌿</div><div class="empty-text">まだ何もありません</div><div class="empty-sub">夢を追加してみましょう</div></div>`;
    return;
  }
  const parts = [];
  if (active.length > 0 && done.length > 0) {
    parts.push(...active.map(item => buildItemHTML(item)));
    parts.push(`<div class="done-separator" style="text-align:center;padding:10px 0 6px;font-size:11px;letter-spacing:0.2em;color:var(--faded);border-top:1px dashed var(--aged);margin-top:4px;">✅ 達成済み</div>`);
    parts.push(...done.map(item => buildItemHTML(item)));
  } else {
    parts.push(...[...active,...done].map(item => buildItemHTML(item)));
  }
  list.innerHTML = parts.join('');
}

function renderVisitGrid(mode) {
  // グリッドと統計だけ更新（地図は更新しない）
  const visited = visitData[mode] || {};
  const currentYear = new Date().getFullYear();
  const count = Object.keys(visited).length;
  const list = mode==='japan' ? JAPAN_PREFS : mode==='onsen' ? ONSEN_LIST : mode==='china' ? CHINA_REGIONS : WORLD_COUNTRIES;
  const total = list.length;
  const pct = total ? Math.round(count/total*100) : 0;
  document.getElementById('visitStats').textContent = `訪問済み ${count} / ${total}ヶ所　達成率 ${pct}%`;
  document.getElementById('visitFill').style.width = pct + '%';
  document.getElementById('mapOverlay').innerHTML = `${count}/${total}<br>${pct}%`;
  // 地図の色を更新
  reapplyMapColors(mode, visited, currentYear);
  // 温泉ドットを更新
  if (mode === 'onsen') {
    const svg = d3.select('#worldD3svg');
    const mapEl = document.getElementById('visitMap');
    if (mapEl && !svg.empty()) {
      const w = mapEl.offsetWidth || 340;
      const h = Math.round(w*0.85);
      const projection = d3.geoMercator().center([136.5,37.5]).scale(w*2.0).translate([w/2,h/2]).clipExtent([[0,0],[w,h]]);
      drawOnsenDots(svg, projection, visited);
    }
  }
  // 履歴も更新
  renderVisitHistory(mode);
}

function renderVisit(mode) {
  const titleEl = document.getElementById('visitTitle');
  const gridEl = document.getElementById('visitGrid');
  const visited = visitData[mode] || {};
  const currentYear = new Date().getFullYear();
  let list, title, key;
  if (mode === 'japan') { list = JAPAN_PREFS; title = '🗾 日本 都道府県'; key = 'japan'; }
  else if (mode === 'onsen') { list = ONSEN_LIST; title = '♨️ にっぽんの温泉100選 <span style="font-size:12px;color:var(--accent);font-weight:700;">+11特別追加</span>'; key = 'onsen'; }
  else if (mode === 'gourmet') { list = GOURMET_DATA.map(g=>g.key); title = '🍽 ご当地グルメ'; key = 'gourmet'; }
  else if (mode === 'ramen') { list = RAMEN_DATA.map(r=>r.key); title = '🍜 ご当地ラーメン'; key = 'ramen'; }
  else if (mode === 'china') { list = CHINA_REGIONS; title = '🇨🇳 中国 省・自治区・直轄市'; key = 'china'; }
  else { list = WORLD_COUNTRIES; title = '🌍 世界の国々'; key = 'world'; }

  const count = Object.keys(visited).length;
  const total = list.length;
  const pct = total ? Math.round(count / total * 100) : 0;
  titleEl.innerHTML = title;
  document.getElementById('visitStats').textContent = `訪問済み ${count} / ${total}ヶ所　達成率 ${pct}%`;
  document.getElementById('visitFill').style.width = pct + '%';
  document.getElementById('mapOverlay').innerHTML = `${count}/${total}<br>${pct}%`;

        let style = isVisited ? `background:rgba(243,156,18,0.2);border-color:rgba(243,156,18,0.6);color:#d35400;` : '';
        const yearLabel = isVisited && year ? `<span class="visit-year">${year}</span>` : '';
        html += `<div class="visit-item${isVisited?' visited':''}" data-vkey="${r.key}" style="${style}" onclick="toggleVisitAndMap('${key}','${r.key}',this)"><span style="font-size:9px;opacity:0.75;display:block;">${r.city}</span><span style="font-size:10px;font-weight:700;">${r.food}</span>${yearLabel}</div>`;
      });
      html += `</div></div>`;
    });
    gridEl.innerHTML = html;
    gridEl.style.flexDirection = 'column';
  } else if (mode === 'japan' || mode === 'china') {
    gridEl.innerHTML = list.map(name => {
      const year = visited[name];
      const isVisited = year !== undefined;
      let style = '';
      if (isVisited && year) { const age = currentYear-year; const op = Math.max(0.4,1-age*0.06); style = `style="background:rgba(139,44,100,${op});border-color:rgba(139,44,100,${op});color:white;"`; }
      const yearLabel = isVisited && year ? `<span class="visit-year">${year}</span>` : '';
      return `<div class="visit-item${isVisited?' visited':''}" data-vkey="${name}" ${style} onclick="toggleVisitAndMap('${key}','${name}',this)">${name}${yearLabel}</div>`;
    }).join('');
  }
  renderVisitHistory(key);
  // 地図描画（完全独立・エラーがタブ切替に影響しない）
  const mapEl = document.getElementById('visitMap');
  if (mapEl) {
    mapEl.innerHTML = '<svg id="worldD3svg" style="width:100%;height:auto;display:block;"></svg>';
    // gourmet/ramenは日本地図を使用
    const mapKey = (key === 'gourmet' || key === 'ramen') ? 'onsen' : key;
    window.setTimeout(function() {
      renderMapD3(mapKey, visited, currentYear).catch(function(e){ console.warn('地図:', e); });
    }, 50);
  }
}

function toggleOnsenDetail(btn) {
  const dayBath = btn.getAttribute('data-bath') || '';
  const name = btn.getAttribute('data-name') || '';
  const wrap = btn.closest('.onsen-item-wrap');
  let popup = wrap.querySelector('.onsen-detail-popup');
  if (popup) { popup.remove(); btn.textContent='🛁'; return; }
  popup = document.createElement('div');
  popup.className = 'onsen-detail-popup';
  popup.innerHTML = `<strong>🛁 日帰り入浴できる宿</strong>${dayBath}`;
  wrap.appendChild(popup);
  btn.textContent = '✕';
}

function toggleVisitAndMap(key, name, el) {
  toggleVisit(key, name, el);
}

function toggleVisit(key, name, el) {
  if (!visitData[key]) visitData[key] = {};
  if (visitData[key][name] !== undefined) {
    const displayName = key==='onsen' ? (ONSEN_DATA.find(o=>o.key===name)?.name||name) : name;
    if (!confirm(`「${displayName}」の訪問歴を削除してもよいですか？`)) return;
    delete visitData[key][name];
    if (el && el.classList) { el.classList.remove('visited'); el.removeAttribute('style'); const y=el.querySelector('.visit-year'); if(y)y.remove(); }
    const gridItem = document.querySelector(`.visit-item[data-vkey="${name}"]`);
    if (gridItem && gridItem!==el) { gridItem.classList.remove('visited'); gridItem.removeAttribute('style'); const y=gridItem.querySelector('.visit-year'); if(y)y.remove(); }
    saveVisit();
    renderVisitGrid(currentMode);
  } else {
    const targetEl = (el&&el.classList) ? el : (document.querySelector(`.visit-item[data-vkey="${name}"]`)||document.createElement('div'));
    showYearDialog(key, name, targetEl);
  }
}

let _yearDialogKey='', _yearDialogName='', _yearDialogEl=null;

function showYearDialog(key, name, el) {
  _yearDialogKey=key; _yearDialogName=name; _yearDialogEl=el;
  const currentYear = new Date().getFullYear();
  const sel = document.getElementById('yearSelect');
  sel.innerHTML='';
  for (let y=currentYear; y>=1950; y--) { const opt=document.createElement('option'); opt.value=y; opt.textContent=y+'年'; sel.appendChild(opt); }
  sel.value=currentYear;
  document.getElementById('yearDialogTitle').textContent=`「${name}」を訪問した年`;
  document.getElementById('yearDialog').style.display='flex';
}

function confirmYear() {
  const year = parseInt(document.getElementById('yearSelect').value);
  const key=_yearDialogKey, name=_yearDialogName, el=_yearDialogEl;
  document.getElementById('yearDialog').style.display='none';
  if (!visitData[key]) visitData[key]={};
  visitData[key][name]=year;
  const age=new Date().getFullYear()-year;
  const op=Math.max(0.4,1-age*0.06);
  if (el&&el.classList) {
    el.classList.add('visited');
    el.style=`background:rgba(139,44,100,${op});border-color:rgba(139,44,100,${op});color:white;`;
    let yearEl=el.querySelector('.visit-year');
    if (!yearEl) { yearEl=document.createElement('span'); yearEl.className='visit-year'; el.appendChild(yearEl); }
    yearEl.textContent=year;
  }
  saveVisit();
  renderVisitGrid(currentMode);
}

function cancelYear() { document.getElementById('yearDialog').style.display='none'; }

async function renderMapD3(key, visited, currentYear) {
  try {
  const mapEl = document.getElementById('visitMap');
  if (!mapEl) return;
  const w = mapEl.offsetWidth || 340;

  if (key === 'world') {
    const h = Math.round(w * 0.5);
    const svg = d3.select('#worldD3svg').attr('viewBox', `0 0 ${w} ${h}`);
    svg.selectAll('*').remove();
    const projection = d3.geoNaturalEarth1().rotate([-150,0]).scale(w*0.17).translate([w/2,h/2]);
    const pathGen = d3.geoPath().projection(projection);
    try {
      const world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
      const countries = topojson.feature(world, world.objects.countries);
      svg.selectAll('path').data(countries.features).join('path')
        .attr('d', pathGen)
        .attr('data-code', d => String(d.id))
        .style('fill', d => {
          const name = CODE_COUNTRY_MAP[String(d.id)];
          if (name && visited[name] !== undefined) {
            const age = currentYear-(visited[name]||currentYear);
            return `rgba(139,44,100,${Math.max(0.4,1-age*0.06)})`;
          }
          return '#e8dfc8';
        })
        .attr('stroke','#9a8f7a').attr('stroke-width',0.4).style('cursor','pointer')
        .on('click', function(event,d) {
          const name = CODE_COUNTRY_MAP[String(d.id)];
          if (!name) return;
          const el = document.querySelector(`.visit-item[data-vkey="${name}"]`)||document.createElement('div');
          toggleVisit(key, name, el);
          const yr = visitData[key]?.[name];
          d3.select(this).style('fill', yr!==undefined ? `rgba(139,44,100,${Math.max(0.4,1-(currentYear-(yr||currentYear))*0.06)})` : '#e8dfc8');
        });
      setTimeout(()=>reapplyMapColors(key,visited,currentYear),150);

let currentMapLayer = 'all';

function toggleMapLayer(layer, btn) {
  currentMapLayer = layer;
  document.querySelectorAll('.map-layer-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // 現在の地図のsvgとprojectionを再利用してドットを更新
  redrawDots();
}

function redrawDots() {
  const svg = d3.select('#worldD3svg');
  if (svg.empty()) return;
  const mapEl = document.getElementById('visitMap');
  if (!mapEl) return;
  const w = mapEl.offsetWidth || 340;
  const h = Math.round(w * 0.85);
  const projection = d3.geoMercator()
    .center([136.5, 37.5]).scale(w * 2.0)
    .translate([w / 2, h / 2]).clipExtent([[0, 0], [w, h]]);
  const onsenVisited = visitData['onsen'] || {};
  const gourmetVisited = visitData['gourmet'] || {};
  const ramenVisited = visitData['ramen'] || {};
  // 全ドット削除
  svg.selectAll('.onsen-dot,.gourmet-dot,.ramen-dot').remove();
  if (currentMapLayer === 'onsen' || currentMapLayer === 'all') {
    drawOnsenDots(svg, projection, onsenVisited);
  }
  if (currentMapLayer === 'gourmet' || currentMapLayer === 'all') {
    drawGourmetDots(svg, projection, gourmetVisited);
  }
  if (currentMapLayer === 'ramen' || currentMapLayer === 'all') {
    drawRamenDots(svg, projection, ramenVisited);
  }
}

function drawRamenDots(svg, projection, visited) {
  svg.selectAll('.ramen-dot').remove();
  RAMEN_DATA.forEach(r => {
    if (!r.coords) return;
    const proj = projection([r.coords[0], r.coords[1]]);
    if (!proj) return;
    const [x, y] = proj;
    if (x < 0 || y < 0) return;
    const isVisited = visited[r.key] !== undefined;
    if (isVisited) {
      svg.append('circle')
        .attr('class', 'ramen-dot')
        .attr('cx', x).attr('cy', y).attr('r', 7)
        .style('fill', 'none')
        .style('stroke', '#e67e22').style('stroke-width', 2)
        .style('pointer-events', 'none');
    }
    svg.append('circle')
      .attr('class', 'ramen-dot')
      .attr('cx', x).attr('cy', y).attr('r', 4)
      .style('fill', isVisited ? '#d35400' : '#f39c12')
      .style('stroke', 'white').style('stroke-width', 1)
      .style('cursor', 'pointer').style('opacity', isVisited ? 1 : 0.8)
      .on('click', function() {
        const el = document.querySelector(`.visit-item[data-vkey="${r.key}"]`) || document.createElement('div');
        toggleVisit('ramen', r.key, el);
        redrawDots();
      })
      .append('title')
      .text(`${r.food}（${r.city}）
${r.shop}${isVisited ? ' ✅訪問済' : ''}`);
  });
}

function drawGourmetDots(svg, projection, visited) {
  svg.selectAll('.gourmet-dot').remove();
  GOURMET_DATA.forEach(g => {
    if (!g.coords) return;
    const proj = projection([g.coords[0], g.coords[1]]);
    if (!proj) return;
    const [x, y] = proj;
    if (x < 0 || y < 0) return;
    const isVisited = visited[g.key] !== undefined;
    // 外円（◎の外）
    if (isVisited) {
      svg.append('circle')
        .attr('class', 'gourmet-dot')
        .attr('cx', x).attr('cy', y).attr('r', 7)
        .style('fill', 'none')
        .style('stroke', '#2ecc71').style('stroke-width', 2)
        .style('pointer-events', 'none');
    }
    svg.append('circle')
      .attr('class', 'gourmet-dot')
      .attr('cx', x).attr('cy', y).attr('r', isVisited ? 4 : 4)
      .style('fill', isVisited ? '#27ae60' : '#2ecc71')
      .style('stroke', 'white').style('stroke-width', 1)
      .style('cursor', 'pointer').style('opacity', isVisited ? 1 : 0.7)
      .on('click', function() {
        const el = document.querySelector(`.visit-item[data-vkey="${g.key}"]`) || document.createElement('div');
        toggleVisit('gourmet', g.key, el);
        redrawDots();
      })
      .append('title')
      .text(`${g.food}（${g.city}）\n${g.shop}${isVisited ? ' ✅訪問済' : ''}`);
  });
}

function drawOnsenDots(svg, projection, visited) {
  svg.selectAll('.onsen-dot').remove();
  ONSEN_DATA.forEach(onsen => {
    const coords = ONSEN_COORDS[onsen.key];
    if (!coords) return;
    const proj = projection([coords[0], coords[1]]);
    if (!proj) return;
    const [x, y] = proj;
    if (x < 0 || y < 0) return;
    const isVisited = visited[onsen.key] !== undefined;
    // 訪問済みは◎（外円追加）
    if (isVisited) {
      svg.append('circle')
        .attr('class', 'onsen-dot')
        .attr('cx', x).attr('cy', y).attr('r', 8)
        .style('fill', 'none')
        .style('stroke', '#e63946').style('stroke-width', 2)
        .style('pointer-events', 'none');
    }
    svg.append('circle')
      .attr('class', 'onsen-dot')
      .attr('cx', x).attr('cy', y).attr('r', isVisited ? 4 : 4)
      .style('fill', isVisited ? '#e63946' : '#2196F3')
      .style('stroke', 'white').style('stroke-width', 1.2)
      .style('cursor', 'pointer').style('opacity', isVisited ? 1 : 0.8)
      .on('click', function() {
        const el = document.querySelector(`.visit-item[data-vkey="${onsen.key}"]`) || document.createElement('div');
        toggleVisit('onsen', onsen.key, el);
        redrawDots();
      })
      .append('title')
      .text(`${onsen.name}（${onsen.pref}）${onsen.starStr}${isVisited ? ' ✅訪問済' : ''}`);
  });
}

function reapplyMapColors(key, visited, currentYear) {
  Object.entries(visited||{}).forEach(([name,year])=>{
    const age = currentYear-(year||currentYear);
    const fill = `rgba(139,44,100,${Math.max(0.4,1-age*0.06)})`;
    if (key==='world') {
      const code = COUNTRY_CODE_MAP[name];
      if (code) d3.select(`#worldD3svg path[data-code="${code}"]`).style('fill',fill);
    } else if (key==='japan'||key==='onsen') {
      d3.selectAll(`#worldD3svg path[data-pref="${name}"]`).style('fill',fill);
    } else if (key==='china') {
      d3.selectAll(`#worldD3svg path[data-province="${name}"]`).style('fill',fill);
    }
  });
}

function renderVisitHistory(key) {
  const historyEl = document.getElementById('visitHistory');
  if (!historyEl) return;
  const visited = visitData[key]||{};
  const entries = Object.entries(visited);
  if (!entries.length) { historyEl.innerHTML=''; return; }
  const byYear={};
  entries.forEach(([name,year])=>{ const y=year||new Date().getFullYear(); if(!byYear[y])byYear[y]=[]; byYear[y].push(name); });
  const years=Object.keys(byYear).map(Number).sort((a,b)=>b-a);
  let html='<div class="visit-history-title">📅 訪問履歴（名前タップで年変更）</div>';
  years.forEach(year=>{
    html+=`<div class="visit-history-year">${year}年</div><div class="visit-history-places">`;
    byYear[year].forEach((name,i)=>{ if(i>0)html+='　／　'; html+=`<span class="history-name-btn" onclick="changeVisitYear('${key}','${name}')">${name}</span>`; });
    html+='</div>';
  });
  historyEl.innerHTML=html;
}

function changeVisitYear(key, name) {
  _yearDialogKey=key; _yearDialogName=name;
  const currentYear=new Date().getFullYear();
  const existingYear=(visitData[key]||{})[name]||currentYear;
  const sel=document.getElementById('yearSelect');
  sel.innerHTML='';
  for(let y=currentYear;y>=1950;y--){const opt=document.createElement('option');opt.value=y;opt.textContent=y+'年';sel.appendChild(opt);}
  sel.value=existingYear;
  document.getElementById('yearDialogTitle').textContent=`「${name}」の訪問年を変更`;
  _yearDialogEl=document.querySelector(`.visit-item[data-vkey="${name}"]`)||document.createElement('div');
  document.getElementById('yearDialog').style.display='flex';
}

// render() と updateTrashCount() は window.onload で呼ばれます
